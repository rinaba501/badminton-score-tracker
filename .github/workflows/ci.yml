name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  core-tests:
    name: BadmintonCore Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select newest installed Xcode
        run: |
          latest=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $latest"
          sudo xcode-select -s "$latest"
          swift --version

      - name: Run package tests
        run: swift test --package-path BadmintonCore

  build:
    name: Watch App Build
    runs-on: macos-latest
    env:
      PROJECT: "badminton score tracker.xcodeproj"
      SCHEME: "badminton score tracker Watch App"
    steps:
      - uses: actions/checkout@v4

      - name: Select newest installed Xcode
        run: |
          latest=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $latest"
          sudo xcode-select -s "$latest"
          xcodebuild -version

      - name: Build for watchOS Simulator
        run: |
          set -o pipefail
          # Pick a concrete, available watchOS simulator (a real UDID, which
          # skips the "Any watchOS Simulator Device" placeholder automatically).
          # Capture -showdestinations output including stderr: if it fails, the
          # job must print the actual xcodebuild error instead of dying silently
          # on the assignment under `set -e` + pipefail.
          dest_output=$(xcodebuild -project "$PROJECT" -scheme "$SCHEME" -showdestinations 2>&1 || true)
          dest_id=$(printf '%s\n' "$dest_output" \
            | grep 'platform:watchOS Simulator' \
            | grep -oiE 'id:[0-9A-F-]{36}' \
            | head -1 | cut -d: -f2 || true)
          if [ -z "$dest_id" ]; then
            echo "::error::No watchOS Simulator destination found; -showdestinations output follows."
            printf '%s\n' "$dest_output"
            exit 1
          fi
          echo "Using destination id: $dest_id"
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "id=$dest_id" \
            CODE_SIGNING_ALLOWED=NO
