name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  core-tests:
    name: BadmintonCore Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select newest installed Xcode
        run: |
          latest=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $latest"
          sudo xcode-select -s "$latest"
          swift --version

      - name: Run package tests
        run: swift test --package-path BadmintonCore

  build:
    name: Watch App Build
    runs-on: macos-latest
    env:
      PROJECT: "badminton score tracker.xcodeproj"
      SCHEME: "badminton score tracker Watch App"
    steps:
      - uses: actions/checkout@v4

      - name: Select newest installed Xcode
        run: |
          latest=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $latest"
          sudo xcode-select -s "$latest"
          xcodebuild -version

      - name: Build for watchOS Simulator
        run: |
          set -o pipefail
          # Compile-only gate: build-for-testing compiles the app AND both
          # test bundles (so the test targets can't silently rot) without
          # executing anything. The generic destination targets the watchOS
          # Simulator SDK without needing a concrete simulator device —
          # runner images don't reliably ship watchOS simulators, and only
          # `xcodebuild test` needs a real one.
          xcodebuild build-for-testing \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "generic/platform=watchOS Simulator" \
            CODE_SIGNING_ALLOWED=NO
